<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Form | Admin</title>
    <link rel="stylesheet" href="css/global-styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body class="admin-body">

    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <span class="text-logo">The Spiritual House</span>
            <span class="admin-badge">Admin Panel</span>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-sessions.html" class="sidebar-link">Sessions</a>
            <a href="admin-events.html" class="sidebar-link active">Events</a>
            <a href="admin-login.html" class="sidebar-link logout-link">Logout</a>
        </nav>
    </aside>

    <main class="admin-main">
        <div class="admin-topbar">
            <h1 class="admin-page-title">Add / Edit Event</h1>
            <a href="admin-events.html" class="global-ghost-btn">Cancel</a>
        </div>

        <div class="admin-form-card">
            <form action="admin-events.html">
                
                <div class="form-grid">
                    <div class="input-group">
                        <label>Event Title</label>
                        <input type="text" placeholder="e.g. Shine Your Light" required>
                    </div>
                    <div class="input-group">
                        <label>Event Type</label>
                        <select required>
                            <option value="confirmed">Confirmed Event</option>
                            <option value="proposal">Proposal (TBD)</option>
                        </select>
                    </div>
                </div>

                <div class="form-grid full">
                    <div class="input-group">
                        <label>Featured Image</label>
                        <input type="file" accept="image/*">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="input-group">
                        <label>Date</label>
                        <input type="date">
                    </div>
                    <div class="input-group">
                        <label>Time</label>
                        <input type="time">
                    </div>
                </div>

                <div class="form-grid">
                    <div class="input-group">
                        <label>Price (USD)</label>
                        <input type="number" placeholder="e.g. 120">
                    </div>
                    <div class="input-group">
                        <label>Max Capacity</label>
                        <input type="number" placeholder="e.g. 20">
                    </div>
                </div>

                <div class="form-grid full">
                    <div class="input-group">
                        <label>Full Description</label>
                        <div class="editor-container">
                            <div id="event-editor">
                                <p>Write the event description and details here...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <button type="submit" class="global-gold-btn" style="width: auto; margin-top: 20px;">SAVE EVENT</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Initialize WYSIWYG Editor
        var quill = new Quill('#event-editor', {
            theme: 'snow',
            placeholder: 'Compose the description...',
            modules: {
                toolbar: [
                    [{ 'header': [2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['image', 'link'],
                    ['clean']
                ]
            }
        });
    </script>
</body>
</html>
