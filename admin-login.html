<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | The Spiritual House</title>
    <link rel="stylesheet" href="css/global-styles.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="admin-body">

    <main class="admin-login-container">
        <div class="login-card">
            <span class="text-logo">The Spiritual House</span>
            <p class="login-subtitle">Admin Dashboard</p>

            <form action="admin-sessions.html" method="GET">
                <div class="input-group" style="margin-bottom: 20px;">
                    <label for="email">Email</label>
                    <input type="email" id="email" required placeholder="admin@thespiritualhouse.com">
                </div>
                
                <div class="input-group" style="margin-bottom: 10px;">
                    <label for="password">Password</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>

                <a href="#" class="forgot-password">Forgot password?</a>

                <button type="submit" class="global-gold-btn" style="width: 100%;">LOGIN</button>
            </form>
        </div>
    </main>

</body>
</html>
