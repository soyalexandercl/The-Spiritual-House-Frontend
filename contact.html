<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact The Spiritual House for guidance, sessions or general inquiries.">
    <title>Contact | The Spiritual House</title>
    <link rel="stylesheet" href="css/global-styles.css">
    <link rel="stylesheet" href="css/contact.css">
</head>
<body>

    <header class="main-header">
        </header>

    <main class="contact-content">
        <section class="form-section">
            <header class="contact-header">
                <h1 class="main-gold-title">CONTACT US</h1>
            </header>
            <form class="contact-form" action="#" method="POST">
                <div class="input-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" name="name" required>
                </div>
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                <div class="input-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" required></textarea>
                </div>
                <button type="submit" class="global-gold-btn">SEND MESSAGE</button>
            </form>
        </section>
    </main>

    <footer class="main-footer">
        <div class="footer-logo">The Spiritual House</div>
        <p class="footer-text">&copy; 2026 The Spiritual House by David Muñeton. All rights reserved.</p>
    </footer>

</body>
</html>
