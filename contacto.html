<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Contact David Muñeton.">
    <title>Contact | The Spiritual House</title>
    <link rel="stylesheet" href="css/estilosGlobales.css">
    <link rel="stylesheet" href="css/contacto.css">
</head>
<body>

    <header class="encabezadoPrincipal">
        </header>

    <main class="contenidoContacto">
        <section class="seccionFormulario">
            <header class="cabeceraContacto">
                <h1 class="tituloPrincipalDorado">CONTACT</h1>
            </header>
            
            <form class="formularioContacto" action="#" method="POST">
                <div class="grupoInput">
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" required>
                </div>
                
                <div class="grupoInput">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" name="telefono" required>
                </div>
                
                <div class="grupoInput">
                    <label for="correo">Correo</label>
                    <input type="email" id="correo" name="correo" required>
                </div>
                
                <div class="grupoInput">
                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" required></textarea>
                </div>
                
                <button type="submit" class="botonDoradoGlobal">ENVIAR</button>
            </form>
        </section>
    </main>

</body>
</html>
