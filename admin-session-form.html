<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Form | Admin</title>
    <link rel="stylesheet" href="css/global-styles.css">
    <link rel="stylesheet" href="css/admin.css">
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
</head>
<body class="admin-body">

    <aside class="admin-sidebar">
        <div class="sidebar-header">
            <span class="text-logo">The Spiritual House</span>
            <span class="admin-badge">Admin Panel</span>
        </div>
        <nav class="sidebar-nav">
            <a href="admin-sessions.html" class="sidebar-link active">Sessions</a>
            <a href="admin-events.html" class="sidebar-link">Events</a>
            <a href="admin-login.html" class="sidebar-link logout-link">Logout</a>
        </nav>
    </aside>

    <main class="admin-main">
        <div class="admin-topbar">
            <h1 class="admin-page-title">Add / Edit Session</h1>
            <a href="admin-sessions.html" class="global-ghost-btn">Cancel</a>
        </div>

        <div class="admin-form-card">
            <form action="admin-sessions.html">
                
                <div class="form-grid full">
                    <div class="input-group">
                        <label>Session Title</label>
                        <input type="text" placeholder="e.g. Video Call (Online)" required>
                    </div>
                </div>

                <div class="form-grid full">
                    <div class="input-group">
                        <label>Featured Image</label>
                        <input type="file" accept="image/*">
                    </div>
                </div>

                <div class="form-grid full">
                    <div class="input-group">
                        <label>Full Description</label>
                        <div class="editor-container">
                            <div id="session-editor">
                                <p>Write the session description here...</p>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="form-grid full">
                    <div class="input-group">
                        <label>Durations and Prices</label>
                        <div class="duration-list">
                            <div class="duration-item">
                                <input type="text" placeholder="Duration (e.g. 60 minutes)" value="60 minutes">
                                <input type="number" placeholder="Price in USD (e.g. 88)" value="88">
                                <button type="button" class="remove-btn">&times;</button>
                            </div>
                            <div class="duration-item">
                                <input type="text" placeholder="Duration (e.g. 30 minutes)">
                                <input type="number" placeholder="Price in USD (e.g. 48)">
                                <button type="button" class="remove-btn">&times;</button>
                            </div>
                        </div>
                        <button type="button" class="global-ghost-btn" style="margin-top: 15px; font-size: 11px;">+ Add another duration</button>
                    </div>
                </div>

                <button type="submit" class="global-gold-btn" style="width: auto; margin-top: 20px;">SAVE SESSION</button>
            </form>
        </div>
    </main>

    <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
    <script>
        // Initialize WYSIWYG Editor
        var quill = new Quill('#session-editor', {
            theme: 'snow',
            placeholder: 'Compose the description...',
            modules: {
                toolbar: [
                    [{ 'header': [2, 3, false] }],
                    ['bold', 'italic', 'underline', 'strike'],
                    [{ 'list': 'ordered'}, { 'list': 'bullet' }],
                    ['image', 'link'],
                    ['clean']
                ]
            }
        });
    </script>
</body>
</html>
